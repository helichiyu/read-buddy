<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Read Buddy</title>
  <!-- 苹果风格样式 -->
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* 设置面板内联布局样式（测试连接行的 flex 布局，不适合放外部） */
    .test-row { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
  </style>
</head>
<body>

<div id="app">

  <!-- ========== 左侧：聊天对话区 ========== -->
  <div id="chat-panel">
    <!-- 标题栏 -->
    <div class="chat-header">
      <h1>📖 Read Buddy</h1>
      <button class="btn-icon" id="btn-settings" title="设置">⚙️</button>
    </div>

    <!-- 消息列表 -->
    <div id="chat-messages">
      <!-- 消息由 JS 动态渲染 -->
    </div>

    <!-- 输入区 -->
    <div class="chat-input-area">
      <input type="text" id="chat-input" placeholder="输入消息..." autocomplete="off">
      <button id="btn-send">发送</button>
    </div>
  </div>

  <!-- ========== 右侧：推荐书籍卡片列表 ========== -->
  <div id="book-panel">
    <!-- 书架标题 -->
    <div class="book-header">
      <h2>📚 待阅读 <span id="book-count">0 本</span></h2>
    </div>

    <!-- 卡片列表 -->
    <div id="book-list">
      <div class="book-empty" id="book-empty">
        暂无推荐书籍，和 AI 聊聊你的阅读经历吧！
      </div>
    </div>

    <!-- 底部操作栏 -->
    <div class="book-actions">
      <button id="btn-export">📤 导出存档</button>
      <button id="btn-import">📥 导入存档</button>
    </div>
  </div>

</div>

<!-- ========== 设置面板弹窗 ========== -->
<div id="settings-overlay">
  <div id="settings-panel">
    <h2>设置</h2>

    <!-- AI 配置 -->
    <div class="settings-section">
      <h3>AI 配置</h3>
      <label for="setting-api-url">API Base URL</label>
      <input type="text" id="setting-api-url" placeholder="https://api.deepseek.com/v1">
      <label for="setting-api-key">API Key</label>
      <input type="password" id="setting-api-key" placeholder="输入你的 API Key">
      <label for="setting-model">模型名称</label>
      <input type="text" id="setting-model" placeholder="deepseek-chat">
      <div class="test-row">
        <button class="btn-test" id="btn-test-connection">测试连接</button>
        <span class="status-dot" id="connection-status"></span>
      </div>
    </div>

    <!-- Token 用量 -->
    <div class="settings-section">
      <h3>用量统计</h3>
      <div class="token-display">
        本次对话：<span id="token-session">0</span> tokens<br>
        累计消耗：<span id="token-total">0</span> tokens
      </div>
    </div>

    <!-- 个性化设置 -->
    <div class="settings-section">
      <h3>个性化</h3>
      <label for="setting-buddy-name">AI 昵称</label>
      <input type="text" id="setting-buddy-name" placeholder="Read Buddy">
      <label for="setting-user-name">你的昵称</label>
      <input type="text" id="setting-user-name" placeholder="告诉我怎么称呼你">
      <label for="setting-greeting">自定义问候语</label>
      <input type="text" id="setting-greeting" placeholder="每次打开时对你说什么（留空自动生成）">
    </div>

    <!-- 操作按钮 -->
    <div class="settings-footer">
      <button class="btn-cancel" id="btn-settings-close">取消</button>
      <button class="btn-save" id="btn-settings-save">保存</button>
    </div>
  </div>
</div>

<script src="js/books.js"></script>
<script src="js/settings.js"></script>
<script src="js/chat.js"></script>
<script src="js/app.js"></script>

</body>
</html>
